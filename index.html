<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveStory Gift - ของขวัญแทนใจ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>💖 LoveStory Gift</h1>
        <p class="text-center" style="color: #D2B48C;">ของขวัญแทนใจ ให้คนพิเศษ</p>

        <div class="row" id="product-list"></div>
    </div>

    <script>
        // ใส่ URL ของ Google Apps Script ของคุณ
        const API_URL = 'https://script.google.com/macros/s/AKfycbxNCOjb44vqGGvgSv_nmd3JrN9K_QjmSRBNyfhQaduByHYht52xCkFdHdlK6itYGqee/exec';

        const productList = document.getElementById('product-list');

        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}?path=getProducts`);
                const result = await response.json();

                if (!result.success) {
                    productList.innerHTML = `<p style="color:#B76E79;">เกิดข้อผิดพลาด: ${result.error}</p>`;
                    return;
                }

                const products = result.data;
                if (products.length === 0) {
                    productList.innerHTML = '<p>ยังไม่มีสินค้า</p>';
                    return;
                }

                productList.innerHTML = '';
                products.forEach(product => {
                    productList.innerHTML += `
                        <div class="col-md-4">
                            <div class="card">
                                <img src="${product.image || 'https://via.placeholder.com/300x200?text=LoveStory'}" class="card-img-top" alt="${product.name}">
                                <h3>${product.name}</h3>
                                <p style="color: #B76E79;">${product.price} บาท</p>
                                <a href="product.html?id=${product.id}" class="btn btn-primary">เลือกของขวัญ</a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                productList.innerHTML = '<p style="color:#B76E79;">ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้</p>';
            }
        }

        loadProducts();
    </script>
</body>
</html>
