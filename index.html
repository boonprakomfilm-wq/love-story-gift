<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveStory Gift - ของขวัญแทนใจ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fff0f5;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.02);
        }
        .btn-primary {
            background-color: #ff69b4;
            border-color: #ff69b4;
            border-radius: 25px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center">💖 LoveStory Gift</h1>
        <h3 class="text-center mb-4">ของขวัญแทนใจ ให้คนพิเศษ</h3>
        
        <div class="row" id="product-list"></div>
    </div>

    <script>
        // ใส่ URL จาก Google Apps Script ตรงนี้
        const API_URL = 'https://script.google.com/macros/s/AKfycbxNCOjb44vqGGvgSv_nmd3JrN9K_QjmSRBNyfhQaduByHYht52xCkFdHdlK6itYGqee/exec';

        const productList = document.getElementById('product-list');

        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}?path=getProducts`);
                const result = await response.json();
                
                if (!result.success) {
                    productList.innerHTML = '<div class="col-12 text-center text-danger">เกิดข้อผิดพลาด: ' + result.error + '</div>';
                    return;
                }

                const products = result.data;
                if (products.length === 0) {
                    productList.innerHTML = '<div class="col-12 text-center">ยังไม่มีสินค้า</div>';
                    return;
                }

                productList.innerHTML = '';
                products.forEach(product => {
                    productList.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="${product.image || 'https://via.placeholder.com/300'}" class="card-img-top" alt="${product.name}">
                                <div class="card-body">
                                    <h5 class="card-title">${product.name}</h5>
                                    <p class="card-text text-primary fw-bold">${product.price} บาท</p>
                                    <a href="product.html?id=${product.id}" class="btn btn-primary">เลือกของขวัญ</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                productList.innerHTML = '<div class="col-12 text-center text-danger">ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้</div>';
            }
        }

        loadProducts();
    </script>
</body>
</html>
