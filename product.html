<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขเนื้อหา - LoveStory Gift</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>✏️ แก้ไขเนื้อหา</h2>
        <div class="product-detail" id="product-detail"></div>

        <form id="edit-form">
            <div id="dynamic-fields"></div>
            <button type="submit" class="btn btn-success">ดำเนินการสั่งซื้อ</button>
        </form>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxNCOjb44vqGGvgSv_nmd3JrN9K_QjmSRBNyfhQaduByHYht52xCkFdHdlK6itYGqee/exec';
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) window.location.href = '/';

        async function loadProduct() {
            try {
                const response = await fetch(`${API_URL}?path=getProducts`);
                const result = await response.json();

                if (!result.success) {
                    alert('เกิดข้อผิดพลาด: ' + result.error);
                    return;
                }

                const product = result.data.find(p => p.id == productId);
                if (!product) {
                    window.location.href = '/';
                    return;
                }

                document.getElementById('product-detail').innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price-tag">${product.price} บาท</p>
                `;

                const fieldsContainer = document.getElementById('dynamic-fields');
                fieldsContainer.innerHTML = '';

                // สร้างฟิลด์ตามข้อมูลใน product.fields
                product.fields.forEach(field => {
                    let inputHtml = '';
                    if (field.type === 'textarea') {
                        inputHtml = `<textarea class="form-control" name="${field.label}" ${field.required ? 'required' : ''}></textarea>`;
                    } else if (field.type === 'color') {
                        inputHtml = `<input type="color" class="form-control" name="${field.label}" value="#B76E79">`;
                    } else if (field.type === 'file') {
                        inputHtml = `<input type="file" class="form-control" name="${field.label}" ${field.required ? 'required' : ''}>`;
                    } else {
                        inputHtml = `<input type="text" class="form-control" name="${field.label}" ${field.required ? 'required' : ''} placeholder="กรอก${field.label}">`;
                    }

                    fieldsContainer.innerHTML += `
                        <div class="form-group">
                            <label class="form-label">${field.label} ${field.required ? '*' : ''}</label>
                            ${inputHtml}
                        </div>
                    `;
                });

                // เก็บข้อมูลราคาและ id ไว้ใน session
                sessionStorage.setItem('productPrice', product.price);
                sessionStorage.setItem('productId', productId);

            } catch (error) {
                console.error(error);
                alert('ไม่สามารถโหลดข้อมูลสินค้าได้');
            }
        }

        document.getElementById('edit-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const customData = [];
            for (let [key, value] of formData.entries()) {
                customData.push({ label: key, value: value });
            }

            sessionStorage.setItem('tempOrder', JSON.stringify({
                productId: sessionStorage.getItem('productId'),
                customData,
                totalPrice: sessionStorage.getItem('productPrice')
            }));

            window.location.href = 'checkout.html';
        });

        loadProduct();
    </script>
</body>
</html>
